name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Android SDK (official)
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Prepare web assets
        run: npm run prepare-web

      - name: Install Capacitor
        run: npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest --no-save

      - name: Add Android platform
        run: npx cap add android

      - name: Update compileSdk/targetSdk/buildTools to 35
        run: |
          sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]\+/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/buildToolsVersion "[0-9.]\+"/buildToolsVersion "35.0.0"/' android/app/build.gradle

      - name: Copy web assets
        run: npx cap copy android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
