name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android command-line tools and SDK packages
        run: |
          set -e
          echo "Installing Android command-line tools..."
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          # download the command-line tools (latest known package)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools || true
          # move to 'latest' folder expected by sdkmanager
          if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
            mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest || true
          fi
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "Android SDK components installed."

      - name: Show Java and sdk versions
        run: |
          java -version
          sdkmanager --list || true

      - name: Install project dependencies
        run: |
          npm ci || npm install

      - name: Prepare web assets
        run: |
          npm run prepare-web

      - name: Install Capacitor CLI
        run: |
          npm install @capacitor/cli @capacitor/core --no-save

      - name: Add Android platform (if missing)
        run: |
          npx cap add android || true

      - name: Copy web assets to Android
        run: |
          npx cap copy android || npx cap copy

      - name: Make gradlew executable
        run: |
          chmod +x android/gradlew || true

      - name: Build APK (debug)
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
