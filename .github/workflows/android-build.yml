name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java (Temurin 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Android SDK (platform-tools, build-tools)
        uses: r0adkll/install-android-sdk@v2
        with:
          api-levels: 33
          build-tools: '33.0.2'
          ndk: ''

      - name: Show Java and sdk versions
        run: |
          java -version
          sdkmanager --list || true

      - name: Install project dependencies
        run: |
          npm ci || npm install

      - name: Prepare web assets
        run: |
          npm run prepare-web

      - name: Install Capacitor CLI
        run: |
          npm install @capacitor/cli @capacitor/core --no-save

      - name: Add Android platform (if missing)
        run: |
          npx cap add android || true

      - name: Copy web assets to Android
        run: |
          npx cap copy android || npx cap copy

      - name: Make gradlew executable
        run: |
          chmod +x android/gradlew || true

      - name: Build APK (debug)
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
